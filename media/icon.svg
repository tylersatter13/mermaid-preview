<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1B2A4A"/>
      <stop offset="100%" stop-color="#0F1B33"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="20" ry="20" fill="url(#bg)"/>

  <!-- Connector: A -> B -->
  <line x1="64" y1="38" x2="64" y2="50" stroke="#00D4FF" stroke-width="2.5" opacity="0.8"/>

  <!-- Connector: B -> C -->
  <line x1="50" y1="68" x2="36" y2="82" stroke="#00B4D8" stroke-width="2.5" opacity="0.7"/>

  <!-- Connector: B -> D -->
  <line x1="78" y1="68" x2="92" y2="82" stroke="#00B4D8" stroke-width="2.5" opacity="0.7"/>

  <!-- Node A: top rounded rect -->
  <rect x="34" y="16" width="60" height="22" rx="6" ry="6"
    fill="#00B4D8" fill-opacity="0.15" stroke="#00D4FF" stroke-width="2.5"/>
  <line x1="46" y1="25" x2="82" y2="25" stroke="#00D4FF" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="50" y1="30" x2="78" y2="30" stroke="#00D4FF" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>

  <!-- Node B: diamond -->
  <polygon points="64,48 82,60 64,72 46,60"
    fill="#00B4D8" fill-opacity="0.15" stroke="#00D4FF" stroke-width="2.5"/>
  <circle cx="64" cy="60" r="3" fill="#00D4FF" opacity="0.5"/>

  <!-- Node C: bottom-left -->
  <rect x="12" y="84" width="48" height="22" rx="6" ry="6"
    fill="#00B4D8" fill-opacity="0.15" stroke="#00B4D8" stroke-width="2.5"/>
  <line x1="22" y1="93" x2="50" y2="93" stroke="#00B4D8" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="26" y1="98" x2="46" y2="98" stroke="#00B4D8" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>

  <!-- Node D: bottom-right with eye -->
  <rect x="68" y="84" width="48" height="22" rx="6" ry="6"
    fill="#00B4D8" fill-opacity="0.15" stroke="#00B4D8" stroke-width="2.5"/>
  <!-- Eye motif -->
  <path d="M78,95 Q92,85 106,95 Q92,105 78,95 Z"
    fill="none" stroke="#00D4FF" stroke-width="2" opacity="0.8"/>
  <circle cx="92" cy="95" r="3.5" fill="none" stroke="#00D4FF" stroke-width="1.5" opacity="0.8"/>
  <circle cx="92" cy="95" r="1.5" fill="#00D4FF" opacity="0.7"/>
</svg>
